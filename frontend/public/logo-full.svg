<svg xmlns="http://www.w3.org/2000/svg" width="900" height="240" viewBox="0 0 900 240" role="img" aria-label="AI Resume Builder Logo Modern Minimal (Revisi)"> <defs> <style> .primary { fill: rgb(2 132 199 / var(--tw-text-opacity, 1)); } .primary-stroke { stroke: rgb(2 132 199 / var(--tw-text-opacity, 1)); } .subtle { fill: rgb(2 132 199 / 0.18); } </style> </defs> <rect x="0" y="0" width="900" height="240" fill="none"/> <!-- Icon: circular badge + pen + AI orbit (simple/modern) --> <g transform="translate(40,30)"> <!-- Badge ring --> <circle cx="85" cy="85" r="75" fill="none" class="primary-stroke" stroke-width="3" opacity="0.35"/> <circle cx="85" cy="85" r="58" fill="none" class="primary-stroke" stroke-width="3" opacity="0.18"/> <!-- Orbit / nodes --> <path d="M25 85 C35 55, 55 35, 85 30 C120 25, 145 45, 155 75" fill="none" class="primary-stroke" stroke-width="3" stroke-linecap="round" opacity="0.55"/> <path d="M155 95 C145 125, 125 145, 95 150 C60 155, 35 135, 25 105" fill="none" class="primary-stroke" stroke-width="3" stroke-linecap="round" opacity="0.35"/> <circle cx="35" cy="85" r="4.5" class="primary" opacity="0.9"/> <circle cx="85" cy="30" r="4.5" class="primary" opacity="0.9"/> <circle cx="155" cy="75" r="4.5" class="primary" opacity="0.7"/> <circle cx="95" cy="150" r="4.5" class="primary" opacity="0.6"/> <!-- Pen / resume stroke --> <g transform="translate(45,45)"> <!-- Body --> <path d="M25 95 L75 45" fill="none" class="primary-stroke" stroke-width="10" stroke-linecap="round"/> <!-- Tip --> <path d="M75 45 L92 28" fill="none" class="primary-stroke" stroke-width="10" stroke-linecap="round"/> <!-- Diagonal highlight --> <path d="M30 90 L78 42" fill="none" stroke="rgb(2 132 199 / 0.25)" stroke-width="6" stroke-linecap="round"/> </g> <!-- Document lines --> <g transform="translate(55,105)" opacity="0.95"> <rect x="0" y="0" width="120" height="10" rx="5" class="primary" opacity="0.18"/> <rect x="0" y="18" width="85" height="10" rx="5" class="primary" opacity="0.22"/> <rect x="0" y="36" width="105" height="10" rx="5" class="primary" opacity="0.16"/> </g> </g> <!-- Text --> <g transform="translate(240,70)"> <text x="0" y="0" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="54" font-weight="850" fill="rgb(2 132 199 / var(--tw-text-opacity, 1))" style="--tw-text-opacity: 1;"> AI Resume Builder </text> <text x="2" y="44" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="18" font-weight="650" fill="rgb(2 132 199 / 0.55)"> Desain CV otomatis dengan AI </text> </g> </svg>